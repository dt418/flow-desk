name: flow-desk

# DATABASE_URL: for multi-replica API, put PgBouncer in front and set
# connection_limit on the URL (see docs/DEPLOY.md). Example:
#   .../flowdesk?schema=public&connection_limit=5
x-common-env: &common-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-flowdesk}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-flowdesk}?schema=public
  # Optional Redis AUTH: set REDIS_PASSWORD in .env and use redis://:${REDIS_PASSWORD}@redis:6379
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
  JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
  LLM_API_KEY: ${LLM_API_KEY:?LLM_API_KEY must be set in .env}
  LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
  LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2048}
  LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-flowdesk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-flowdesk} -d ${POSTGRES_DB:-flowdesk}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # When REDIS_PASSWORD is set, require AUTH (match REDIS_URL in .env).
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server --appendonly yes
        fi
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      UPLOAD_DIR: /data/attachments
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-26214400}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
    volumes:
      - attachments_data:/data
    ports:
      - '${API_PORT:-3000}:3000'
    healthcheck:
      # Readiness: Postgres + Redis must answer (not just process-up).
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/ready']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  email-worker:
    build:
      context: .
      dockerfile: docker/email-worker.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      APP_URL: ${APP_URL:-http://localhost:3000}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-nodemailer}
      EMAIL_FROM: ${EMAIL_FROM:-FlowDesk <noreply@flowdesk.app>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    # Process + Redis TCP reachability (queue backend). Not a full BullMQ depth probe.
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "const n=require(\"net\");const h=process.env.REDIS_URL&&process.env.REDIS_URL.includes(\"@\")?process.env.REDIS_URL.split(\"@\").pop().split(\":\")[0]:\"redis\";const s=n.connect(6379,h||\"redis\");s.on(\"connect\",()=>{s.end();process.exit(0)});s.on(\"error\",()=>process.exit(1));setTimeout(()=>process.exit(1),4000)"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-5173}:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  attachments_data:
