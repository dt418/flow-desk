# FlowDesk lefthook configuration
#
# Install:  pnpm setup:lefthook  (or:  pnpm exec lefthook install)
# Run all:  pnpm verify
#
# ┌─────────────┬──────────────┬──────────────────────────────────────────┐
# │ Layer       │ Bypassable?  │ Purpose                                  │
# ├─────────────┼──────────────┼──────────────────────────────────────────┤
# │ pre-commit  │ YES (--no-   │ Fast feedback (<15s): secret scan +      │
# │             │   verify)    │ format + lint + per-package typecheck    │
# │             │              │ on staged files only                     │
# │ pre-push    │ YES (--no-   │ Heavier gates (<90s): full typecheck +   │
# │             │   verify)    │ all unit tests + api integration + build │
# │ CI (GitHub) │ NO           │ Unbypassable gate on push/PR to main:    │
# │             │              │ full pipeline via turbo, required for    │
# │             │              │ merge via branch protection              │
# └─────────────┴──────────────┴──────────────────────────────────────────┘
#
# Local hooks are convenience only. CI is the source of truth.
# Never use --no-verify to skip a failing hook — fix the underlying issue.

pre-commit:
  parallel: true
  commands:
    secrets:
      glob: '*'
      exclude: "(\\.githooks/|\\.lefthook/|lefthook\\.yml|docs/|\\.md$)"
      run: bash .githooks/pre-commit
    format-check:
      glob: '*.{ts,tsx,js,jsx,json,md,css,yml,yaml}'
      # Skip symlinks (multi-agent skill/command adapters point at canonical trees;
      # Prettier errors when given an explicit symlink path).
      run: >
        bash -c 'real=(); for f in {staged_files}; do
        [ -L "$f" ] && continue; [ -f "$f" ] || continue; real+=("$f"); done;
        [ ${#real[@]} -eq 0 ] && exit 0;
        pnpm exec prettier --check "${real[@]}"'
    eslint-check:
      glob: '*.{ts,tsx}'
      run: pnpm exec eslint {staged_files}
    typecheck-shared:
      glob: 'packages/shared/src/**/*.ts'
      run: pnpm --filter @flow-desk/shared typecheck
    typecheck-api:
      glob: 'apps/api/src/**/*.ts'
      run: pnpm --filter @flow-desk/api typecheck
    typecheck-web:
      glob: 'apps/web/src/**/*.{ts,tsx}'
      run: pnpm --filter @flow-desk/web typecheck

pre-push:
  parallel: true
  commands:
    typecheck-all:
      run: pnpm typecheck
    unit-tests:
      run: pnpm --filter @flow-desk/api test:unit && pnpm --filter @flow-desk/web test && pnpm --filter @flow-desk/shared test
    integration-tests:
      run: pnpm --filter @flow-desk/api test:integration
    build:
      run: pnpm build
